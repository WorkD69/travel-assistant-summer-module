<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тревел-помощник</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="design-tokens.css" />
  <link rel="stylesheet" href="assets/css/app-shell.css" />
</head>
<body data-app-environment="production">
  <noscript>
    <p style="padding: 24px; font-family: sans-serif;">
      Для работы «Тревел-помощника» нужен включённый JavaScript.
      Откройте <a href="login.html">страницу входа</a>.
    </p>
  </noscript>
  <script src="assets/js/auth-storage.js"></script>
  <script>
    // Единая точка входа: с активной сессией — на Главную, без неё — на вход.
    (function () {
      var target = "login.html";
      try {
        var token = window.TravelAuthStorage && window.TravelAuthStorage.load();
        if (token) target = "home.html";
      } catch (error) { /* нет сессии — на вход */ }
      window.location.replace(target + window.location.search.replace(/^\?/, "?"));
    })();
  </script>
</body>
</html>
